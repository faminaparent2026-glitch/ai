<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B.H Agent</title>
    <style>
        body {
            background: #0d1117;
            color: #e6edf3;
            font-family: 'Consolas', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            border: 1px solid #30363d;
            padding: 40px;
            border-radius: 12px;
            background: #161b22;
        }
        h1 {
            color: #00ff88;
            font-size: 2.5em;
        }
        .status {
            color: #7d8590;
            margin-top: 10px;
            font-size: 1.1em;
        }
        .status span {
            color: #00ff88;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>> B.H. Agent</h1>
        <div class="status">Status: <span>online</span></div>
        <div class="status">System ready</div>
    </div>
</body>
</html>
