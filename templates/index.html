<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B.H Agent Terminal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0d1117;
            font-family: 'Consolas', 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 900px;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 0 40px rgba(0, 255, 136, 0.05);
        }
        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding-bottom: 16px;
            border-bottom: 1px solid #30363d;
            margin-bottom: 20px;
        }
        .header .prompt {
            color: #00ff88;
            font-size: 22px;
            font-weight: bold;
        }
        .header .title {
            color: #e6edf3;
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .header .subtitle {
            color: #7d8590;
            font-size: 14px;
            margin-left: auto;
            font-style: italic;
        }
        .response-area {
            background: #0d1117;
            min-height: 400px;
            max-height: 600px;
            overflow-y: auto;
            padding: 16px;
            border-radius: 8px;
            border: 1px solid #30363d;
            margin-bottom: 16px;
            color: #e6edf3;
            white-space: pre-wrap;
            font-size: 14px;
            line-height: 1.6;
        }
        .response-area::-webkit-scrollbar {
            width: 8px;
        }
        .response-area::-webkit-scrollbar-track {
            background: #0d1117;
        }
        .response-area::-webkit-scrollbar-thumb {
            background: #30363d;
            border-radius: 4px;
        }
        .message {
            margin-bottom: 12px;
            animation: fadeIn 0.25s ease-in;
        }
        .message .sender {
            color: #00ff88;
            font-weight: bold;
            display: block;
            margin-bottom: 4px;
        }
        .message .sender::before {
            content: '▶ ';
        }
        .message div {
            padding-left: 20px;
            color: #e6edf3;
        }
        .error {
            color: #ff5555;
            background: rgba(255, 85, 85, 0.1);
            padding: 8px 12px;
            border-radius: 4px;
            border-left: 3px solid #ff5555;
            margin-bottom: 12px;
            animation: fadeIn 0.25s ease-in;
            font-weight: bold;
        }
        .thinking {
            color: #7d8590;
            font-style: italic;
            padding-left: 20px;
            margin-bottom: 12px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .input-area {
            display: flex;
            gap: 12px;
            align-items: stretch;
        }
        .input-area input {
            flex: 1;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 12px 16px;
            color: #e6edf3;
            font-family: 'Consolas', monospace;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        .input-area input:focus {
            border-color: #00ff88;
        }
        .input-area input::placeholder {
            color: #7d8590;
        }
        .input-area input:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .input-area button {
            background: #00cc66;
            color: #0d1117;
            border: none;
            border-radius: 6px;
            padding: 12px 28px;
            font-family: 'Consolas', monospace;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            min-width: 100px;
            letter-spacing: 0.5px;
        }
        .input-area button:hover:not(:disabled) {
            background: #00ff88;
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
        }
        .input-area button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .input-area button:active:not(:disabled) {
            transform: scale(0.98);
        }
        .footer {
            margin-top: 16px;
            padding-top: 12px;
            border-top: 1px solid #30363d;
            color: #7d8590;
            font-size: 12px;
            text-align: center;
            letter-spacing: 0.5px;
        }
        .footer span {
            color: #00ff88;
        }
        @media (max-width: 768px) {
            .container {
                width: 95%;
                padding: 16px;
            }
            .input-area {
                flex-direction: column;
            }
            .input-area button {
                width: 100%;
                padding: 14px;
            }
            .header .subtitle {
                display: none;
            }
            .response-area {
                min-height: 300px;
                max-height: 400px;
            }
        }
        @media (max-width: 480px) {
            .header .title {
                font-size: 18px;
            }
            .header .prompt {
                font-size: 18px;
            }
            .response-area {
                min-height: 250px;
                max-height: 350px;
                font-size: 13px;
                padding: 12px;
            }
            .input-area input {
                font-size: 13px;
                padding: 10px 14px;
            }
            .input-area button {
                font-size: 13px;
                padding: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <span class="prompt">></span>
            <span class="title">B.H. Agent</span>
            <span class="subtitle">v1.0 · terminal</span>
        </div>
        <div id="response" class="response-area">
            <div class="message">
                <span class="sender">SYSTEM</span>
                <div>B.H Agent initialized. Ready for commands.</div>
            </div>
        </div>
        <div class="input-area">
            <input type="text" id="query" placeholder="Type your command..." autofocus>
            <button id="send">Send</button>
        </div>
        <div class="footer">
            <span>◉</span> online · <span>Enter</span> to send · <span>Shift+Enter</span> for new line
        </div>
    </div>

    <script>
        const responseEl = document.getElementById('response');
        const queryInput = document.getElementById('query');
        const sendBtn = document.getElementById('send');

        function autoScroll() {
            responseEl.scrollTop = responseEl.scrollHeight;
        }

        function appendMessage(sender, text) {
            const div = document.createElement('div');
            div.className = 'message';
            div.innerHTML = `
                <span class="sender">${sender}</span>
                <div>${text}</div>
            `;
            responseEl.appendChild(div);
            autoScroll();
        }

        function appendError(error) {
            const div = document.createElement('div');
            div.className = 'error';
            div.textContent = `ERROR: ${error}`;
            responseEl.appendChild(div);
            autoScroll();
        }

        function setLoading(state) {
            if (state) {
                sendBtn.disabled = true;
                sendBtn.textContent = 'Processing...';
                queryInput.disabled = true;
                const thinking = document.createElement('div');
                thinking.className = 'thinking';
                thinking.id = 'thinking-indicator';
                thinking.textContent = '[ B.H Agent is thinking... ]';
                responseEl.appendChild(thinking);
                autoScroll();
            } else {
                sendBtn.disabled = false;
                sendBtn.textContent = 'Send';
                queryInput.disabled = false;
                const indicator = document.getElementById('thinking-indicator');
                if (indicator) indicator.remove();
                queryInput.focus();
            }
        }

        async function sendMessage() {
            const text = queryInput.value.trim();
            if (!text) return;

            appendMessage('USER', text);
            setLoading(true);

            try {
                const response = await fetch('/process', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ query: text })
                });

                const data = await response.json();

                if (data.status === 'success') {
                    appendMessage('B.H AGENT', data.response);
                } else {
                    appendError(data.error || 'Unknown error occurred');
                }
            } catch (error) {
                appendError(error.message || 'Network error - check server connection');
            } finally {
                setLoading(false);
                queryInput.value = '';
            }
        }

        queryInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        sendBtn.addEventListener('click', sendMessage);

        queryInput.focus();
    </script>
</body>
</html>
