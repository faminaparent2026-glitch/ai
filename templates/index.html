<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>B.H Agent Terminal</title>
    <style>
        body { background: #0d1117; color: #e6edf3; font-family: monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { width: 90%; max-width: 600px; background: #161b22; padding: 20px; border-radius: 8px; border: 1px solid #30363d; }
        .response-area { height: 300px; overflow-y: auto; border: 1px solid #30363d; padding: 10px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>B.H Agent Interface</h2>
        <div id="response" class="response-area"></div>
        <input type="text" id="query" placeholder="Command...">
        <button onclick="sendMessage()">Send</button>
    </div>
    <script>
        async function sendMessage() {
            const query = document.getElementById('query').value;
            const res = await fetch('/process', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({query: query})
            });
            const data = await res.json();
            document.getElementById('response').innerHTML += `<p>> ${data.response}</p>`;
        }
    </script>
</body>
</html>
